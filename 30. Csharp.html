<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Noxa Store - C# | Materi Pembelajaran</title>
    <style>
        /* ========== WARNA UTAMA C# - THEME ========== */

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: radial-gradient(circle at 30% 20%, #733382, #17002E);
            font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, 'Roboto', sans-serif;
            padding: 1.5rem;
            min-height: 100vh;
            scroll-behavior: smooth;
            transition: background 0.7s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        body.theme-csharp-primary {
            background: radial-gradient(circle at 30% 20%, #733382, #17002E);
        }

        body.theme-csharp-pink {
            background: radial-gradient(circle at 60% 40%, #CC90B1, #2a0a2a);
        }

        body.theme-csharp-light {
            background: radial-gradient(circle at 70% 30%, #E0C0C9, #3a1a3a);
        }

        body.theme-csharp-purple {
            background: radial-gradient(circle at 40% 70%, #A971BD, #2a0a3a);
        }

        body.theme-csharp-dark {
            background: radial-gradient(circle at 80% 50%, #17002E, #0a001a);
        }

        .app-container {
            max-width: 1600px;
            margin: 0 auto;
            background: rgba(0, 0, 0, 0.65);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border-radius: 2rem;
            padding: 1.5rem;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.8);
            border: 1px solid rgba(115, 51, 130, 0.5);
        }

        .top-brand-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 1.5rem;
            border-bottom: 2px solid rgba(204, 144, 177, 0.5);
            padding-bottom: 1rem;
        }

        .noxa-store {
            font-size: clamp(1.5rem, 5vw, 2.8rem);
            font-weight: 800;
            background: linear-gradient(135deg, #E0C0C9, #CC90B1);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 12px rgba(115, 51, 130, 0.6);
            animation: softPulseCSharp 2.5s infinite alternate;
        }

        @keyframes softPulseCSharp {
            0% {
                text-shadow: 0 0 4px #733382;
                opacity: 0.95;
            }

            100% {
                text-shadow: 0 0 20px #E0C0C9;
                opacity: 1;
            }
        }

        .judul-web-kanan h1 {
            font-size: clamp(1rem, 3.5vw, 1.6rem);
            font-weight: 700;
            background: linear-gradient(120deg, #E0C0C9, #CC90B1);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-align: right;
        }

        .judul-web-kanan p {
            font-size: 0.65rem;
            color: #E0C0C9;
            text-align: right;
        }

        .top-stats-search {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .total-stats-box {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            background: rgba(0, 0, 0, 0.5);
            padding: 0.5rem 1rem;
            border-radius: 2rem;
            border: 1px solid rgba(115, 51, 130, 0.5);
        }

        .total-stats-box span {
            font-size: 0.8rem;
            color: white;
            background: rgba(115, 51, 130, 0.3);
            padding: 0.2rem 0.8rem;
            border-radius: 2rem;
        }

        .total-stats-box span strong {
            color: #E0C0C9;
        }

        .search-section {
            max-width: 600px;
            margin: 0;
        }

        .search-row-flex {
            display: flex;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
            gap: 0.8rem;
        }

        .search-wrapper {
            position: relative;
            flex: 1;
            min-width: 250px;
        }

        .search-icon {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1.1rem;
            opacity: 0.8;
            pointer-events: none;
        }

        #searchInput {
            width: 100%;
            padding: 0.8rem 2.5rem 0.8rem 3rem;
            background: rgba(0, 0, 0, 0.7);
            border: 1.5px solid rgba(115, 51, 130, 0.6);
            border-radius: 60px;
            font-size: 0.9rem;
            color: white;
            outline: none;
            transition: all 0.3s ease;
        }

        #searchInput:focus {
            border-color: #E0C0C9;
            box-shadow: 0 0 0 3px rgba(115, 51, 130, 0.3);
        }

        #searchInput::placeholder {
            color: #E0C0C9;
        }

        .clear-btn {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: white;
            border-radius: 50%;
            width: 26px;
            height: 26px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .clear-btn:hover {
            background: #CC90B1;
        }

        .btn-refresh-neon {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            background: rgba(115, 51, 130, 0.3);
            border: 1px solid rgba(115, 51, 130, 0.6);
            color: #E0C0C9;
            padding: 0.7rem 1.2rem;
            border-radius: 3rem;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.2s;
            text-decoration: none;
            font-family: inherit;
        }

        .btn-refresh-neon:hover {
            background: rgba(115, 51, 130, 0.5);
            transform: scale(1.02);
            color: #fff;
        }

        .stats-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.5rem 1rem;
            margin: 0.5rem 0 1.5rem;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 60px;
            font-size: 0.8rem;
            flex-wrap: wrap;
            gap: 0.5rem;
            border: 1px solid rgba(115, 51, 130, 0.5);
        }

        .shortcut-msg {
            background: #A971BD;
            padding: 0.2rem 0.8rem;
            border-radius: 30px;
            color: #17002E;
            font-weight: bold;
            font-size: 0.7rem;
            box-shadow: 0 0 6px rgba(169, 113, 189, 0.5);
        }

        /* ========== GRID MATERI ========== */
        #materiContainer {
            display: grid;
            gap: 1.2rem;
            margin-top: 1.5rem;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        }

        /* ========== CARD STYLE ========== */
        .materi-card {
            border-radius: 1rem;
            padding: 1.2rem;
            transition: all 0.25s ease;
            border-left: 4px solid #733382;
            border-right: 1px solid rgba(115, 51, 130, 0.3);
            border-top: 1px solid rgba(115, 51, 130, 0.2);
            border-bottom: 1px solid rgba(115, 51, 130, 0.2);
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
            min-width: 0;
            overflow: hidden;
            background: linear-gradient(135deg, rgba(40, 20, 50, 0.85), rgba(25, 10, 35, 0.7));
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
        }

        .materi-card:hover {
            transform: translateY(-4px);
            border-left-color: #E0C0C9;
            box-shadow: 0 12px 25px -8px rgba(115, 51, 130, 0.5);
            background: linear-gradient(135deg, rgba(115, 51, 130, 0.9), rgba(40, 20, 50, 0.75));
        }

        /* Gradien Card C#-Theme */
        .materi-card.csharp-gradien-0 {
            background: linear-gradient(135deg, rgba(40, 20, 50, 0.85), rgba(25, 10, 35, 0.7));
            border-left-color: #17002E;
        }

        .materi-card.csharp-gradien-1 {
            background: linear-gradient(135deg, rgba(115, 51, 130, 0.85), rgba(40, 20, 50, 0.7));
            border-left-color: #733382;
        }

        .materi-card.csharp-gradien-2 {
            background: linear-gradient(135deg, rgba(204, 144, 177, 0.8), rgba(115, 51, 130, 0.7));
            border-left-color: #CC90B1;
        }

        .mapel-badge {
            background: rgba(204, 144, 177, 0.5);
            color: #F0DCE8;
            display: inline-block;
            font-size: clamp(0.55rem, 2vw, 0.7rem);
            padding: 0.2rem 0.6rem;
            border-radius: 20px;
            width: fit-content;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .card-title {
            color: #F0E8EE;
            font-size: clamp(0.85rem, 2.5vw, 1.1rem);
            line-height: 1.4;
            font-weight: 700;
            text-shadow: 0 1px 3px rgba(0, 0, 0, 0.5);
        }

        /* ========== BUTTON GROUP ========== */
        .button-group {
            display: flex;
            gap: 0.6rem;
            margin-top: 0.4rem;
            width: 100%;
        }

        .button-group .materi-link {
            flex: 1;
            min-width: 0;
            text-decoration: none;
            display: block;
        }

        .btn-dapatkan {
            width: 100%;
            padding: 0.65rem;
            border-radius: 40px;
            font-weight: 600;
            font-size: clamp(0.7rem, 2vw, 0.85rem);
            text-align: center;
            transition: all 0.25s ease;
            display: inline-block;
            border: none;
            font-family: inherit;
            cursor: pointer;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .materi-link:not(.disabled) .btn-dapatkan {
            background: #733382;
            color: #FFFFFF;
            box-shadow: 0 2px 6px rgba(115, 51, 130, 0.5);
        }

        .materi-link:not(.disabled) .btn-dapatkan:hover {
            background: #8a449a;
            transform: translateY(-2px);
        }

        .materi-link.disabled .btn-dapatkan {
            background: #2a2a3a;
            color: #6a6a8a;
            border: 1px solid #4a4a6a;
            cursor: not-allowed;
            transform: none;
            filter: none;
            opacity: 0.7;
        }

        /* ========== NO RESULT ========== */
        .no-result {
            grid-column: 1 / -1;
            text-align: center;
            padding: 2rem;
            color: #E0C0C9;
            background: rgba(0, 0, 0, 0.7);
            border-radius: 1rem;
            margin-top: 1.5rem;
            border: 1px solid rgba(115, 51, 130, 0.5);
        }

        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 3rem 1.5rem;
            background: rgba(0, 0, 0, 0.6);
            border-radius: 1rem;
            border: 1px solid rgba(115, 51, 130, 0.3);
        }

        /* ========== SCROLLBAR ========== */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: #1a0a1a;
        }

        ::-webkit-scrollbar-thumb {
            background: #733382;
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #E0C0C9;
        }

        /* ================================================================ */
        /* FOOTER */
        /* ================================================================ */

        .footer {
            width: 98%;
            max-width: 1600px;
            margin: 1.2rem auto 0;
            padding: 1rem 1.5rem;
            background: rgba(0, 0, 0, 0.55);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 1.5rem;
            border: 1px solid rgba(115, 51, 130, 0.3);
            transition: all 0.3s ease;
        }

        body.theme-csharp-primary .footer {
            border-color: rgba(115, 51, 130, 0.3);
        }

        body.theme-csharp-pink .footer {
            border-color: rgba(204, 144, 177, 0.3);
        }

        body.theme-csharp-light .footer {
            border-color: rgba(224, 192, 201, 0.2);
        }

        body.theme-csharp-purple .footer {
            border-color: rgba(169, 113, 189, 0.3);
        }

        body.theme-csharp-dark .footer {
            border-color: rgba(23, 0, 46, 0.3);
        }

        .footer-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 0.8rem 1.5rem;
        }

        .footer-brand-section {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            flex-wrap: wrap;
        }

        .footer-brand {
            font-size: 1.1rem;
            font-weight: 700;
            letter-spacing: 0.5px;
            background: linear-gradient(135deg, #E0C0C9, #CC90B1);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .footer-tagline {
            font-size: 0.7rem;
            color: #E0C0C9;
            padding: 0.15rem 0.7rem;
            background: rgba(115, 51, 130, 0.15);
            border-radius: 20px;
            border: 1px solid rgba(115, 51, 130, 0.15);
            transition: all 0.8s ease;
        }

        body.theme-csharp-pink .footer-tagline {
            color: #17002E;
            background: rgba(204, 144, 177, 0.2);
            border-color: rgba(204, 144, 177, 0.2);
        }

        body.theme-csharp-light .footer-tagline {
            color: #17002E;
            background: rgba(224, 192, 201, 0.2);
            border-color: rgba(224, 192, 201, 0.2);
        }

        body.theme-csharp-purple .footer-tagline {
            color: #f0e0f8;
            background: rgba(169, 113, 189, 0.2);
            border-color: rgba(169, 113, 189, 0.2);
        }

        body.theme-csharp-dark .footer-tagline {
            color: #cc90b1;
            background: rgba(23, 0, 46, 0.2);
            border-color: rgba(23, 0, 46, 0.2);
        }

        .footer-info {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.4rem;
            font-size: 0.8rem;
            color: #E0C0C9;
            transition: color 0.8s ease;
        }

        body.theme-csharp-pink .footer-info {
            color: #17002E;
        }

        body.theme-csharp-light .footer-info {
            color: #17002E;
        }

        body.theme-csharp-purple .footer-info {
            color: #f0e0f8;
        }

        body.theme-csharp-dark .footer-info {
            color: #cc90b1;
        }

        .footer-info span {
            white-space: nowrap;
        }

        .footer-dot {
            font-size: 0.5rem;
            color: rgba(255, 255, 255, 0.08);
            margin: 0 0.2rem;
        }

        /* ================================================================ */
        /* RESPONSIVE */
        /* ================================================================ */

        @media (min-width: 1700px) {
            body {
                padding: 2rem;
            }

            .app-container {
                max-width: 1800px;
                padding: 2rem;
            }

            #materiContainer {
                grid-template-columns: repeat(6, 1fr);
                gap: 1.5rem;
            }

            .materi-card {
                padding: 2rem;
            }

            .card-title {
                font-size: 1.2rem;
            }

            .btn-dapatkan {
                font-size: 1rem;
                padding: 0.9rem;
            }

            .noxa-store {
                font-size: 3rem;
            }

            .judul-web-kanan h1 {
                font-size: 1.8rem;
            }
        }

        @media (min-width: 1400px) and (max-width: 1699px) {
            #materiContainer {
                grid-template-columns: repeat(5, 1fr);
                gap: 1.2rem;
            }

            .materi-card {
                padding: 1.5rem;
            }

            .card-title {
                font-size: 1.05rem;
            }
        }

        @media (min-width: 1200px) and (max-width: 1399px) {
            #materiContainer {
                grid-template-columns: repeat(4, 1fr);
            }
        }

        @media (min-width: 992px) and (max-width: 1199px) {
            #materiContainer {
                grid-template-columns: repeat(4, 1fr);
            }
        }

        @media (min-width: 768px) and (max-width: 991px) {
            #materiContainer {
                grid-template-columns: repeat(3, 1fr);
                gap: 1rem;
            }

            .materi-card {
                padding: 1.2rem;
            }

            .top-brand-bar {
                gap: 1rem;
            }
        }

        @media (min-width: 576px) and (max-width: 767px) and (orientation: landscape) {
            body {
                padding: 0.8rem;
            }

            .app-container {
                padding: 1rem;
            }

            #materiContainer {
                grid-template-columns: repeat(3, 1fr);
                gap: 0.8rem;
            }

            .materi-card {
                padding: 0.9rem;
            }

            .card-title {
                font-size: 0.8rem;
            }

            .btn-dapatkan {
                padding: 0.4rem;
                font-size: 0.65rem;
            }

            .stats-bar {
                flex-wrap: wrap;
                justify-content: center;
                font-size: 0.65rem;
            }
        }

        @media (max-width: 767px) {
            body {
                padding: 0.8rem;
            }

            .app-container {
                padding: 1rem;
                border-radius: 1.2rem;
            }

            .top-brand-bar {
                flex-direction: column;
                text-align: center;
            }

            .judul-web-kanan h1,
            .judul-web-kanan p {
                text-align: center;
            }

            .noxa-store {
                text-align: center;
                white-space: normal;
            }

            .top-stats-search {
                flex-direction: column;
                align-items: stretch;
            }

            .search-section {
                width: 100%;
                max-width: 100%;
            }

            .search-wrapper {
                min-width: unset;
            }

            .total-stats-box {
                justify-content: center;
            }

            .stats-bar {
                justify-content: center;
                text-align: center;
            }

            #materiContainer {
                grid-template-columns: repeat(2, 1fr);
                gap: 0.9rem;
            }

            .materi-card {
                padding: 1rem;
                min-height: 120px;
            }

            .card-title {
                font-size: 0.9rem;
            }

            .footer {
                padding: 0.8rem 1rem;
                width: 100%;
                border-radius: 0;
                margin-top: 0.8rem;
            }

            .footer-container {
                flex-direction: column;
                text-align: center;
                gap: 0.5rem;
            }

            .footer-brand-section {
                justify-content: center;
            }

            .footer-brand {
                font-size: 1rem;
            }

            .footer-info {
                font-size: 0.7rem;
                justify-content: center;
            }
        }

        @media (max-width: 575px) {
            #materiContainer {
                grid-template-columns: 1fr;
            }

            .materi-card {
                padding: 0.9rem;
            }

            .card-title {
                font-size: 0.85rem;
            }

            .btn-dapatkan {
                padding: 0.5rem;
                font-size: 0.75rem;
            }

            .noxa-store {
                font-size: 1.5rem;
            }
        }

        @media (max-width: 479px) {
            #materiContainer {
                grid-template-columns: 1fr;
            }

            .materi-card {
                padding: 0.9rem;
            }
        }

        @media (max-width: 767px) {
            #materiContainer {
                grid-template-columns: repeat(2, 1fr);
            }

            .materi-card {
                padding: 1rem;
                min-height: 120px;
            }

            .footer {
                border-radius: 0;
                border-left: none;
                border-right: none;
            }
        }

        @media (min-width: 768px) and (max-width: 991px) {
            #materiContainer {
                grid-template-columns: repeat(3, 1fr);
            }

            .materi-card {
                padding: 1.2rem;
            }
        }

        @media (max-width: 767px) {

            .btn-refresh-neon,
            .btn-dapatkan,
            .clear-btn {
                min-height: 44px;
                min-width: 44px;
            }

            #searchInput {
                font-size: 16px;
            }

            .materi-card {
                min-height: 120px;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            * {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }

            body,
            .materi-card,
            .btn-dapatkan,
            .noxa-store {
                animation: none !important;
            }
        }

        @media (prefers-color-scheme: dark) {
            .footer {
                background: rgba(0, 0, 0, 0.7);
            }
        }
    </style>
</head>

            let currentThemeIndex = 0;
            const bodyEl = document.body;

            function applyNextTheme() {
                if (!bodyEl) return;
                colorThemes.forEach(theme => bodyEl.classList.remove(theme));
                currentThemeIndex = (currentThemeIndex + 1) % colorThemes.length;
                bodyEl.classList.add(colorThemes[currentThemeIndex]);
            }
            setInterval(applyNextTheme, 5000);

            // ==================== C# GRADIENT ROTATION ====================
            const csharpGradien = ['csharp-gradien-0', 'csharp-gradien-1', 'csharp-gradien-2'];
            let csharpIndex = 0;
            let gradientInterval = null;

            function rotateCSharpGradient() {
                const csharpCards = document.querySelectorAll('.csharp-card, .materi-card');
                if (csharpCards.length === 0) return;
                csharpIndex = (csharpIndex + 1) % csharpGradien.length;
                csharpCards.forEach(card => {
                    csharpGradien.forEach(gc => card.classList.remove(gc));
                    card.classList.add(csharpGradien[csharpIndex]);
                });
            }
            gradientInterval = setInterval(rotateCSharpGradient, 3000);

            // ==================== DOM ELEMENTS ====================
            const searchInput = document.getElementById('searchInput');
            const materiContainer = document.getElementById('materiContainer');

            const clearBtn = document.getElementById('clearSearchBtn');
            const shortcutNotifSpan = document.getElementById('shortcutNotif');
            const refreshBtn = document.getElementById('refreshButton');

            function getAllCards() {
                return Array.from(document.querySelectorAll('.materi-card'));
            }

            // ==================== UPDATE STATISTIK ====================
            function updateStatistik() {

                let sudahAda = 0;
                let belumAda = 0;

                allCards.forEach(card => {
                    const links = card.querySelectorAll('.button-group .materi-link');
                    let hasValidLink = false;
                    links.forEach(link => {
                        const href = link.getAttribute('href');
                        if (href && href !== '' && href !== '#') {
                            hasValidLink = true;
                        }
                    });
                    if (hasValidLink) {
                        sudahAda++;
                    } else {
                        belumAda++;
                    }
                });

                const totalMateri = document.getElementById('totalMateriCount');
                const materiSudahAda = document.getElementById('materiSudahAda');
                const materiBelumAda = document.getElementById('materiBelumAda');
                if (totalMateri) totalMateri.innerText = allCards.length;
                if (materiSudahAda) materiSudahAda.innerText = sudahAda;
                if (materiBelumAda) materiBelumAda.innerText = belumAda;
            }

            // ==================== FILTER MATERI ====================
            function filterMateri() {
                const searchTerm = searchInput ? searchInput.value.trim().toLowerCase() : '';
                const allCards = getAllCards();
                let visibleCount = 0;

                allCards.forEach(card => {
                    const titleAttr = card.getAttribute('data-title');
                    const titleH3 = card.querySelector('.card-title');
                    let title = '';
                    if (titleAttr) title = titleAttr;
                    else if (titleH3) title = titleH3.innerText || '';
                    title = title.toLowerCase();

                    // CEK APAKAH ADA SETIDAKNYA 1 LINK YANG TERISI
                    const links = card.querySelectorAll('.button-group .materi-link');
                    let hasValidLink = false;
                    links.forEach(link => {
                        const href = link.getAttribute('href');
                        if (href && href !== '' && href !== '#') {
                            hasValidLink = true;
                        }
                    });

                    const isMatch = searchTerm === '' || title.includes(searchTerm);

                    // TAMPILKAN HANYA JIKA ADA LINK VALID DAN MATCH PENCARIAN
                    if (hasValidLink && isMatch) {
                        card.style.display = '';
                        visibleCount++;
                    } else {
                        card.style.display = 'none';
                    }
                });

                // Hapus no-result message jika ada
                let noResultDiv = document.getElementById('customNoResultMsg');
                if (noResultDiv) {
                    noResultDiv.remove();
                    noResultDiv = null;
                }

                if (visibleCount === 0) {
                    if (resultCounterSpan) {
                        if (searchTerm !== '') {
                            resultCounterSpan.innerHTML = '❌ Materi tidak ditemukan';
                            resultCounterSpan.style.color = '#E0C0C9';
                        } else {
                            resultCounterSpan.innerHTML = '📚 Belum ada materi yang tersedia';
                            resultCounterSpan.style.color = '#E0C0C9';
                        }
                    }

                    if (materiContainer && materiContainer.parentNode) {
                        const msgDiv = document.createElement('div');
                        msgDiv.id = 'customNoResultMsg';
                        msgDiv.className = 'no-result';
                        if (searchTerm !== '') {
                            msgDiv.innerHTML = '📚 Materi tidak ditemukan<br><span style="font-size:0.8rem;">Coba kata kunci lain</span>';
                        } else {
                            msgDiv.innerHTML = '📚 Belum ada materi yang tersedia<br><span style="font-size:0.8rem;">Materi akan segera ditambahkan</span>';
                        }
                        materiContainer.parentNode.insertBefore(msgDiv, materiContainer.nextSibling);
                    }
                } else {
                    if (resultCounterSpan) {
                        resultCounterSpan.innerHTML = searchTerm !== '' ? `✨ Ditemukan ${visibleCount} materi` : `📚 ${visibleCount} materi C#`;
                        resultCounterSpan.style.color = '#F0E8EE';
                    }
                }
            }

            // ==================== DEBOUNCE SEARCH ====================
            let debounceTimer;
            if (searchInput) {
                searchInput.addEventListener('input', () => {
                    clearTimeout(debounceTimer);
                    debounceTimer = setTimeout(filterMateri, 200);
                });
            }

            // ==================== CLEAR BUTTON ====================
            if (clearBtn) {
                clearBtn.addEventListener('click', () => {
                    if (searchInput) searchInput.value = '';
                    filterMateri();
                    if (searchInput) searchInput.focus();
                    if (shortcutNotifSpan) {
                        shortcutNotifSpan.innerText = '⌨️ Pencarian dihapus';
                        setTimeout(() => shortcutNotifSpan.innerText = '', 1200);
                    }
                });
            }

            // ==================== UPDATE BUTTON STATES ====================
            function updateButtonsState() {
                document.querySelectorAll('.button-group .materi-link').forEach(link => {
                    const href = link.getAttribute('href');
                    const btn = link.querySelector('button');
                    if (!btn) return;

                    const preventInvalidClick = (e) => {
                        if (!href || href === '' || href === '#') {
                            e.preventDefault();
                            const card = link.closest('.materi-card');
                            const title = card ? card.getAttribute('data-title') || 'Materi' : 'Materi';
                            if (shortcutNotifSpan) {
                                shortcutNotifSpan.innerText = `🔒 Link untuk "${title}" belum tersedia`;
                                setTimeout(() => shortcutNotifSpan.innerText = '', 2000);
                            }
                        }
                    };

                    if (!href || href === '' || href === '#') {
                        btn.style.cursor = 'not-allowed';
                        btn.style.opacity = '0.7';
                        link.removeEventListener('click', preventInvalidClick);
                        link.addEventListener('click', preventInvalidClick);
                    } else {
                        btn.style.cursor = 'pointer';
                        btn.style.opacity = '1';
                        if (!link.getAttribute('target')) link.setAttribute('target', '_blank');
                        link.removeEventListener('click', preventInvalidClick);
                    }
                });
                updateStatistik();
            }

            // ==================== KEYBOARD SHORTCUTS ====================
            window.addEventListener('keydown', (e) => {
                if (!searchInput) return;
                if ((e.ctrlKey && e.key === 'k') || (e.ctrlKey && e.key === 'K')) {
                    e.preventDefault();
                    searchInput.focus();
                    if (shortcutNotifSpan) {
                        shortcutNotifSpan.innerText = '🔎 Ctrl+K fokus pencarian';
                        setTimeout(() => shortcutNotifSpan.innerText = '', 1500);
                    }
                }
                if (e.shiftKey && (e.key === 'F' || e.key === 'f')) {
                    e.preventDefault();
                    searchInput.focus();
                    if (shortcutNotifSpan) {
                        shortcutNotifSpan.innerText = '⚡ Shift+F fokus';
                        setTimeout(() => shortcutNotifSpan.innerText = '', 1500);
                    }
                }
                if (e.key === 'Escape') {
                    if (searchInput.value !== '') {
                        searchInput.value = '';
                        filterMateri();
                        if (shortcutNotifSpan) {
                            shortcutNotifSpan.innerText = '⌨️ Pencarian dibersihkan (ESC)';
                            setTimeout(() => shortcutNotifSpan.innerText = '', 1200);
                        }
                    } else {
                        searchInput.blur();
                    }
                }
            });

            // ==================== REFRESH BUTTON ====================
            if (refreshBtn) {
                refreshBtn.addEventListener('click', () => {
                    if (searchInput) searchInput.value = '';
                    filterMateri();
                    const refreshIcon = refreshBtn.querySelector('span');
                    if (refreshIcon) {
                        refreshIcon.style.animation = 'spin 0.5s ease';
                        setTimeout(() => {
                            refreshIcon.style.animation = '';
                        }, 500);
                    }
                    if (shortcutNotifSpan) {
                        shortcutNotifSpan.innerText = '⟳ Halaman disegarkan';
                        setTimeout(() => shortcutNotifSpan.innerText = '', 1200);
                    }
                    getAllCards().forEach(card => {
                        card.style.transform = 'scale(0.98)';
                        setTimeout(() => {
                            card.style.transform = '';
                        }, 200);
                    });
                    updateButtonsState();
                });
            }

            // ==================== SPIN KEYFRAME ====================
            if (!document.querySelector('#refreshSpinKeyframe')) {
                const spinStyle = document.createElement('style');
                spinStyle.id = 'refreshSpinKeyframe';
                spinStyle.textContent = `@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }`;
                document.head.appendChild(spinStyle);
            }

            // ==================== INIT GRADIENT ====================
            function initCSharpGradient() {
                const csharpCards = document.querySelectorAll('.csharp-card, .materi-card');
                if (csharpCards.length === 0) return;
                csharpCards.forEach(card => {
                    csharpGradien.forEach(gc => card.classList.remove(gc));
                    card.classList.add(csharpGradien[0]);
                });
                csharpIndex = 0;
            }

            // ==================== INITIALIZATION ====================
            setTimeout(() => {
                initCSharpGradient();
                updateButtonsState();
                filterMateri();
            }, 100);

            console.log('✅ Noxa Store | C# - Theme Active');
        })();
    </script>
</body>
